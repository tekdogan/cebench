query: |
  SELECT
    total_injected,
    total_absorbed,
    total_injected - total_absorbed AS leakage_gap
  FROM (
    SELECT
      SUM(CASE WHEN node_type = UINT8(1) THEN demand_value ELSE FLOAT32(0.0) END) AS total_injected,
      SUM(CASE WHEN node_type = UINT8(0) THEN demand_value ELSE FLOAT32(0.0) END) AS total_absorbed
    FROM WATER_METER_READINGS
    WHERE demand_value > FLOAT32(0.0)
    WINDOW TUMBLING(ts, SIZE 30 SEC)
  )
  WHERE total_injected != total_absorbed
  INTO LEAKAGE_SINK

sinks:
  - name: LEAKAGE_SINK
    host: 10.1.1.1:8080
    parser_config: {}
    schema:
      - name: total_injected
        type: FLOAT32
      - name: total_absorbed
        type: FLOAT32
      - name: leakage_gap
        type: FLOAT32
    type: Print
    config:
      output_format: CSV

logical:
  - name: WATER_METER_READINGS
    schema:
      - name: node_type
        type: UINT8
      - name: demand_value
        type: FLOAT32
      - name: ts
        type: UINT64

physical:
  - logical: WATER_METER_READINGS
    host: 10.1.1.3:8080
    parser_config:
      type: CSV
    type: Generator
    source_config:
      generator_rate_type: FIXED
      generator_rate_config: emit_rate 10
      stop_generator_when_sequence_finishes: NONE
      seed: 1
      generator_schema: |
        SEQUENCE UINT8 0 2 1
        NORMAL_DISTRIBUTION FLOAT32 5 3
        SEQUENCE UINT64 0 100000 1000

workers:
  - host: 10.1.1.1:8080
    data: 10.1.1.1:9090
    max_operators: 10000

  - host: 10.1.1.2:8080
    data: 10.1.1.2:9090
    max_operators: 10000
    downstream:
      - 10.1.1.1:8080

  - host: 10.1.1.3:8080
    data: 10.1.1.3:9090
    max_operators: 10000
    downstream:
      - 10.1.1.2:8080


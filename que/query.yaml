query: |
  SELECT * FROM tcp_source INTO csv_sink
sink:
  name: csv_sink
  type: File
  config:
    inputFormat: CSV
    filePath: "/home/ttekdogan/.cache/ccache/test.csv"
    append: false
logical:
  - name: tcp_source
    schema:
      - name: id
        type: UINT64
physical:
  - logical: tcp_source
    parserConfig:
      type: CSV
      tupleDelimiter: "\n"
      fieldDelimiter: ","
    sourceConfig:
      type: TCP
      socketDomain: AF_INET
      socketType: SOCK_STREAM
      socketPort: 5000
      socketHost: 172.18.0.1
      socketBufferSize: 2
      flushIntervalMS: 100
      tcpConnectTimeoutSeconds: 2

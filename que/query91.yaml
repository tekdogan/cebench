query: |
  SELECT
    SUM(CASE WHEN node_type = UINT8(1) THEN demand_value ELSE FLOAT32(0.0) END) AS total_injected,
    SUM(CASE WHEN node_type = UINT8(0) THEN demand_value ELSE FLOAT32(0.0) END) AS total_absorbed,
    MAX(ts) AS max_ts
  FROM WATER_METER_READINGS
  WHERE demand_value > FLOAT32(0.0)
  WINDOW TUMBLING(ts, SIZE 2 SEC)
  INTO LEAKAGE_SINK

sinks:
  - name: LEAKAGE_SINK
    host: 10.1.1.1:8080
    parser_config: {}
    schema:
      - name: total_injected
        type: FLOAT32
      - name: total_absorbed
        type: FLOAT32
      - name: WATER_METER_READINGS$max_ts
        type: UINT64
    type: TCP
    config:
      output_format: CSV
      socket_host: 172.17.0.1
      socket_port: 9000
      socket_domain: AF_INET
      socket_type: SOCK_STREAM
      connect_timeout_seconds: 10

logical:
  - name: WATER_METER_READINGS
    schema:
      - name: node_type
        type: UINT8
      - name: demand_value
        type: FLOAT32
      - name: ts2
        type: UINT64
      - name: ts
        type: UINT64

physical:
  - logical: WATER_METER_READINGS
    type: TCP
    host: 10.1.1.3:8080
    parser_config:
      type: CSV
      tuple_delimiter: "\n"
    source_config:
      socket_domain: AF_INET
      socket_type: SOCK_STREAM
      flush_interval_ms: "200"
      socket_buffer_size: "1024"
      connect_timeout_seconds: "10"
      socket_host: "172.17.0.1"
      socket_port: "8082"

workers:
  - host: 10.1.1.1:8080
    data_address: 10.1.1.1:9090
    max_operators: 10000

  - host: 10.1.1.2:8080
    data_address: 10.1.1.2:9090
    max_operators: 10000
    downstream:
      - 10.1.1.1:8080

  - host: 10.1.1.3:8080
    data_address: 10.1.1.3:9090
    max_operators: 10000
    downstream:
      - 10.1.1.2:8080

